apiVersion: apps/v1
kind: Deployment
metadata:
  name: wstunnel
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: {}
  template:
    metadata: {}
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
      - key: "kubernetes.io/hostname"
        operator: "Equal"
        value: "server"
      containers:
      - name: wstunnel
        image: ghcr.io/erebe/wstunnel:latest
        imagePullPolicy: Always
        args:
        - "./wstunnel"
        - "server"
        - "wss://[::]:8084"
        - "--dns-resolver=dns://[fd00:cafe::2]"
        - "--restrict-config=/etc/wstunnel/restrictions.yaml"
        ports:
        - containerPort: 8084
        volumeMounts:
          - name: wstunnel
            mountPath: /etc/wstunnel
            readOnly: true
      volumes:
      - name: wstunnel
        secret:
          secretName: wstunnel
